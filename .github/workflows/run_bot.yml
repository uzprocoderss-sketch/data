name: 24/7 Telegram Application Bot

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *' # GitHub Actions ba'zan to'xtab qolsa, har 6 soatda avtomat qayta start beradi

concurrency:
  group: telegram-bot-workflow
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # GitHub-ning maksimal limitiga yaqin (360 min max)

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Telegram Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        ADMIN_ID: ${{ secrets.ADMIN_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python bot.py
